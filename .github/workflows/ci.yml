name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Create .env file
        run: |
          echo "DB_USER=${{ secrets.DB_USER }}" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "DB_HOST=${{ secrets.DB_HOST }}" >> .env
          echo "DB_PORT=${{ secrets.DB_PORT }}" >> .env
          echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env

      - name: Run CI ingestion (sample data)
        run: uv run python ingestion/ingest_labour_ci.py

      - name: Create dbt profiles
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          dbt_labour:
            target: dev
            outputs:
              dev:
                type: postgres
                host: ${{ secrets.DB_HOST }}
                port: 5432
                user: ${{ secrets.DB_USER }}
                pass: ${{ secrets.DB_PASSWORD }}
                dbname: ${{ secrets.DB_NAME }}
                schema: public
                threads: 4
          EOF
      
      - name: Install dbt
        run: pip install dbt-postgres==1.10.0

      - name: Run dbt models
        run: dbt run --project-dir dbt_labour --profiles-dir dbt_labour

      - name: Run dbt tests
        run: dbt test --project-dir dbt_labour --profiles-dir dbt_labour

      - name: Run forecasting pipeline
        run: uv run python models/forecast_employment.py

      - name: Run unit tests
        run: uv run pytest tests/test_transformations.py -v

      - name: Run data quality tests
        run: uv run pytest tests/test_data_quality.py -v